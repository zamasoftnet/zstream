description = 'Source Resolver'

dependencies {
    implementation 'commons-codec:commons-codec:1.15'
    implementation 'commons-io:commons-io:2.11.0'
    implementation 'commons-logging:commons-logging:1.2'
}

publishing {
    publications {
        maven(MavenPublication) {
            pom {
                description = 'Source Resolver'
                url = 'https://github.com/zamasoftnet/zstream/tree/main/zstream-resolver'
                
                scm {
                    connection = 'scm:git:https://github.com/zamasoftnet/zstream/tree/main/zstream-resolver'
                    developerConnection = 'scm:git:https://github.com/zamasoftnet/zstream/tree/main/zstream-resolver'
                    url = 'https://github.com/zamasoftnet/zstream/tree/main/zstream-resolver'
                }
            }
        }
    }
}
